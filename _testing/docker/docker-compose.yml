# Stata Linux Docker Environment
#
# Usage:
#   1. Copy .env.example to .env and update paths
#   2. docker-compose build
#   3. docker-compose run --rm stata

version: '3.8'

services:
  stata:
    build: .
    container_name: stata-linux

    volumes:
      # Mount your Stata Linux installation (read-only for safety)
      - ${STATA_PATH}:/usr/local/stata18:ro

      # Mount your working directory
      - ${WORK_DIR:-../..}:/workspace:rw

    stdin_open: true
    tty: true

    working_dir: /workspace
