# Sandboxed Stata-MCP Testing with Docker
#
# This setup runs Claude Code inside Docker with:
# - Only Stata-Tools directory accessible (mounted read-write)
# - Network access to host's Stata-MCP server on port 4000
# - Even if Stata runs `python:` or `shell` commands, they only affect the container
#
# Your existing VS Code Stata-MCP extension runs on the host and handles Stata execution.
# The container connects to it via network, but filesystem operations are sandboxed.

version: '3.8'

services:
  claude-sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    container_name: claude-stata-sandbox

    # Only mount Stata-Tools - nothing else from host filesystem
    volumes:
      - ${STATA_TOOLS_PATH:-../..}:/workspace/Stata-Tools:rw
      - sandbox-output:/workspace/output:rw

    # Connect to host's Stata-MCP server
    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      - STATA_MCP_HOST=host.docker.internal
      - STATA_MCP_PORT=4000
      - WORKSPACE=/workspace/Stata-Tools

    # Keep container running for interactive use
    stdin_open: true
    tty: true

    # Security: no privileged access, drop capabilities
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G

volumes:
  sandbox-output:
    driver: local
